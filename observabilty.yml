name: Observability Stack

on:
  push:
    branches: [main, develop]
    paths:
      - 'monitoring/**'
      - 'logging/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy observability stack'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Action to perform'
        required: true
        default: 'install'
        type: choice
        options:
          - install
          - uninstall

env:
  AWS_REGION: 'ap-south-1'

jobs:
  # ─── Determine environment from branch ────────────────────────────────────
  setup:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Set environment from branch or input
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  # ─── Install / Uninstall Observability Stack ───────────────────────────────
  observability:
    name: ${{ github.event.inputs.action == 'uninstall' && 'Uninstall' || 'Install' }} Observability — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── AWS + tools ────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name devops-portfolio-${{ needs.setup.outputs.environment }}

      # ── UNINSTALL path ─────────────────────────────────────────────────────
      - name: Uninstall Prometheus + Grafana
        if: github.event.inputs.action == 'uninstall'
        run: |
          helm uninstall kube-prometheus-stack -n monitoring 2>/dev/null || true
          echo "✅ Prometheus + Grafana uninstalled."

      - name: Uninstall EFK Stack
        if: github.event.inputs.action == 'uninstall'
        run: |
          kubectl delete -f logging/efk/ --ignore-not-found
          echo "✅ EFK stack uninstalled."

      # ── INSTALL path ───────────────────────────────────────────────────────

      # ── Prometheus + Grafana ───────────────────────────────────────────────
      - name: Add Prometheus Helm repo
        if: github.event.inputs.action != 'uninstall'
        run: |
          helm repo add prometheus-community \
            https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Install Prometheus + Grafana
        if: github.event.inputs.action != 'uninstall'
        run: |
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            -f monitoring/prometheus/values.yaml \
            --namespace monitoring \
            --create-namespace \
            --set grafana.persistence.enabled=false \
            --wait \
            --timeout 8m
          echo "✅ Prometheus + Grafana installed."

      - name: Apply Prometheus alert rules
        if: github.event.inputs.action != 'uninstall'
        run: |
          kubectl apply -f monitoring/prometheus/alert-rules.yaml
          echo "✅ Alert rules applied."

      - name: Import Grafana dashboard
        if: github.event.inputs.action != 'uninstall'
        run: |
          echo "Waiting for Grafana to be ready..."
          kubectl rollout status deployment/kube-prometheus-stack-grafana \
            -n monitoring --timeout=3m

          # Get Grafana pod name
          GRAFANA_POD=$(kubectl get pods -n monitoring \
            -l app.kubernetes.io/name=grafana \
            -o jsonpath='{.items[0].metadata.name}')

          # Get admin password
          GRAFANA_PASSWORD=$(kubectl get secret kube-prometheus-stack-grafana \
            -n monitoring \
            -o jsonpath="{.data.admin-password}" | base64 -d)

          # Port-forward in background
          kubectl port-forward -n monitoring pod/$GRAFANA_POD 3000:3000 &
          PF_PID=$!
          sleep 5

          # Import dashboard via Grafana API
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -u "admin:${GRAFANA_PASSWORD}" \
            -d "{\"dashboard\": $(cat monitoring/grafana/devops-app-dashboard.json), \"overwrite\": true, \"folderId\": 0}" \
            http://localhost:3000/api/dashboards/db

          kill $PF_PID 2>/dev/null || true
          echo "✅ Grafana dashboard imported."

      # ── EFK Stack ─────────────────────────────────────────────────────────
      - name: Create logging namespace
        if: github.event.inputs.action != 'uninstall'
        run: |
          kubectl apply -f logging/efk/namespace.yaml

      - name: Deploy Elasticsearch
        if: github.event.inputs.action != 'uninstall'
        run: |
          kubectl apply -f logging/efk/elasticsearch.yaml
          echo "Waiting for Elasticsearch to be ready..."
          kubectl rollout status statefulset/elasticsearch \
            -n logging --timeout=5m
          echo "✅ Elasticsearch deployed."

      - name: Deploy Fluentd
        if: github.event.inputs.action != 'uninstall'
        run: |
          kubectl apply -f logging/efk/fluentd.yaml
          echo "Waiting for Fluentd DaemonSet to be ready..."
          kubectl rollout status daemonset/fluentd \
            -n logging --timeout=3m
          echo "✅ Fluentd deployed."

      - name: Deploy Kibana
        if: github.event.inputs.action != 'uninstall'
        run: |
          kubectl apply -f logging/efk/kibana.yaml
          echo "Waiting for Kibana to be ready..."
          kubectl rollout status deployment/kibana \
            -n logging --timeout=5m
          echo "✅ Kibana deployed."

      # ── Verify all pods running ────────────────────────────────────────────
      - name: Verify observability stack
        if: github.event.inputs.action != 'uninstall'
        run: |
          echo "=== Monitoring Pods ==="
          kubectl get pods -n monitoring
          echo ""
          echo "=== Logging Pods ==="
          kubectl get pods -n logging
          echo ""
          echo "=== Services ==="
          kubectl get svc -n monitoring
          kubectl get svc -n logging

      # ── Print access info ──────────────────────────────────────────────────
      - name: Print access instructions
        if: github.event.inputs.action != 'uninstall'
        run: |
          GRAFANA_PASSWORD=$(kubectl get secret kube-prometheus-stack-grafana \
            -n monitoring \
            -o jsonpath="{.data.admin-password}" | base64 -d)

          echo ""
          echo "============================================"
          echo "✅ Observability Stack Deployed"
          echo "============================================"
          echo ""
          echo "Grafana:"
          echo "  kubectl port-forward svc/kube-prometheus-stack-grafana 3000:80 -n monitoring"
          echo "  URL: http://localhost:3000"
          echo "  User: admin"
          echo "  Pass: ${GRAFANA_PASSWORD}"
          echo ""
          echo "Prometheus:"
          echo "  kubectl port-forward svc/kube-prometheus-stack-prometheus 9090:9090 -n monitoring"
          echo "  URL: http://localhost:9090"
          echo ""
          echo "Kibana:"
          echo "  kubectl port-forward svc/kibana 5601:5601 -n logging"
          echo "  URL: http://localhost:5601"
          echo "============================================"

      # ── Slack notifications ────────────────────────────────────────────────
      - name: Notify Slack — Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "📊 *Observability Stack ${{ github.event.inputs.action == 'uninstall' && 'Uninstalled' || 'Installed' }} — ${{ needs.setup.outputs.environment }}*\n*Actor:* ${{ github.actor }}\n*Repo:* ${{ github.repository }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔴 *Observability Stack ${{ github.event.inputs.action == 'uninstall' && 'Uninstall' || 'Install' }} Failed — ${{ needs.setup.outputs.environment }}*\n*Actor:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
